# Local development stack: Qdrant + FastAPI API + Streamlit UI.
# The two app services share one image (built once) and differ only by APP.
#
#   docker compose up --build           # qdrant + api + streamlit
#   docker compose up qdrant            # just the vector DB (for `python build_index.py`)
#   docker compose run --rm api python build_index.py   # build the index inside the stack
#
# Note: ingestion (ingest_mwparser.py) is a separate manual step and is NOT part
# of this stack — see the README.

services:
  qdrant:
    build:
      context: .
      dockerfile: Dockerfile.qdrant
    image: got-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: got-rag-app
    environment:
      APP: api
      PORT: "8000"
      QDRANT_URL: http://qdrant:6333
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy

  streamlit:
    # Reuse the image built by the `api` service.
    image: got-rag-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP: streamlit
      PORT: "8501"
      QDRANT_URL: http://qdrant:6333
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      qdrant:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  qdrant_storage:
